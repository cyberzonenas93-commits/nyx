name: nyx
description: Nyx - A secure media privacy vault app with zero-knowledge architecture
publish_to: 'none'
version: 1.0.2+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Security & Encryption
  crypto: ^3.0.3
  pointycastle: ^3.7.3
  encrypt: ^5.0.3
  
  # Storage
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # Authentication
  flutter_secure_storage: ^9.0.0
  
  # Media & Permissions
  image_picker: ^1.0.5
  file_picker: ^8.1.6
  permission_handler: ^11.1.0
  photo_manager: ^3.0.0
  path: ^1.8.3
  video_player: ^2.8.2
  image: ^4.1.3
  share_plus: ^7.2.1
  video_thumbnail: ^0.5.3
  audioplayers: ^6.0.0
  
  # UI & Animations
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.3.0
  
  # State Management
  provider: ^6.1.1
  
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5
  html: ^0.15.4
  uuid: ^4.3.3
  collection: ^1.18.0
  
  # WiFi Transfer
  shelf: ^1.4.2
  shelf_static: ^1.1.2
  qr_flutter: ^4.1.0
  network_info_plus: ^7.0.0
  archive: ^3.4.0
  
  # In-App Purchases
  in_app_purchase: ^3.1.11
  
  # Document Viewers
  syncfusion_flutter_pdfviewer: ^32.1.23
  open_filex: ^4.3.2
  sensors_plus: ^7.0.0
  webview_flutter: ^4.13.1
  http: ^1.6.0
  youtube_explode_dart: ^2.0.4
  webview_flutter_wkwebview: ^3.23.5
  
  # Cryptography
  argon2: ^1.0.1
  shelf_router: ^1.1.4
  wechat_assets_picker: ^10.1.0
  http_parser: ^4.1.2
  mime: ^1.0.6
  # Note: CRYSTALS-Kyber doesn't have a Dart package yet, will use FFI

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  
  # Assets
  # assets:
  #   - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0E0E11"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter_native_splash:
  color: "#0E0E11"
  image: assets/icon/splash.png
  color_dark: "#0E0E11"
  image_dark: assets/icon/splash.png
  android_12:
    color: "#0E0E11"
    image: assets/icon/splash.png
    color_dark: "#0E0E11"
    image_dark: assets/icon/splash.png
  ios: true
  android: true
  web: false
