<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nyx Terms of Use (EULA)</title>
    <meta name="description" content="Nyx Terms of Use (EULA)" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0c10;
        --card: #12141a;
        --text: #e8eaf0;
        --muted: rgba(232, 234, 240, 0.7);
        --accent: #66e0a3;
        --border: rgba(232, 234, 240, 0.12);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --card: #ffffff;
          --text: #111827;
          --muted: rgba(17, 24, 39, 0.7);
          --accent: #0ea5e9;
          --border: rgba(17, 24, 39, 0.12);
        }
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
        background: var(--bg);
        color: var(--text);
        line-height: 1.55;
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 18px 80px;
      }
      header, section {
        padding: 18px 22px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
      }
      section { margin-top: 18px; }
      h1 { margin: 0 0 8px 0; font-size: 26px; }
      p { margin: 0 0 10px 0; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .muted { color: var(--muted); font-size: 13px; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Nyx Terms of Use (EULA)</h1>
        <p class="muted">
          Nyx uses Apple’s Standard End User License Agreement (EULA) for apps distributed on the App Store.
        </p>
      </header>

      <section>
        <p>
          Read the Apple Standard EULA here:
          <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" rel="noopener">
            https://www.apple.com/legal/internet-services/itunes/dev/stdeula/
          </a>
        </p>
        <p class="muted">
          Privacy Policy: <a href="/privacy">nyx.app/privacy</a>
        </p>
      </section>
    </main>
  </body>
</html>
